services:
  - type: web
    name: doc-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    plan: free
    envVars:
      - key: DATABASE_URL
        value: your_db_url
      - key: SECRET_KEY
        value: your_secret
      - key: OPENAI_API_KEY
        value: your_key